name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v0.1.0, v1.2.3, etc.

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bruh-linux-x86_64
            asset_name: bruh-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: bruh-linux-arm64
            asset_name: bruh-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bruh-macos-arm64
            asset_name: bruh-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: bruh-macos-x86_64
            asset_name: bruh-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bruh-windows-x86_64.exe
            asset_name: bruh-windows-x86_64.exe
          # Termux (Android) builds typically need cross-compilation on Ubuntu
          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact_name: bruh-termux-aarch64
            asset_name: bruh-termux-aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload asset to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream

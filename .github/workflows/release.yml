name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v0.1.0, v1.2.3, etc.

permissions:
  contents: write

jobs:
  # Runs before anything gets built or published, so a broken build or a failing test can
  # never end up as a tagged release. Testing on all three OS families (not just
  # ubuntu-latest) matters here specifically because several files (daemon/packages.rs's
  # poll_winget/poll_choco, for instance) are behind #[cfg(windows)], code gated out like
  # that doesn't even get compiled, let alone tested, unless CI actually runs on a Windows
  # (and separately, a macOS) runner at least once.
  test:
    strategy:
      # Without this, GitHub's default fail-fast behavior cancels the other two OSes the
      # moment one of them fails, so if ubuntu-latest fails first you never find out
      # whether windows-latest or macos-latest would have passed on their own. That
      # defeats the purpose of testing on all three (see the note above about the
      # #[cfg(windows)] pollers), so it's turned off here, matching build-and-upload
      # below, which already does the same thing for the same reason.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      # CHANGED: This step now emits a warning annotation instead of failing the build
      # The || echo "::warning::..." makes it non-blocking while still showing a visible
      # warning in the GitHub Actions UI
      - name: Check formatting
        run: |
          cargo fmt --check || echo "::warning::Formatting issues found, please run 'cargo fmt'"

      - name: Run tests
        run: cargo test --all --verbose

  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # softprops/action-gh-release replaces the old actions/create-release +
      # actions/upload-release-asset pair. Both of those have been unmaintained for a long
      # while now (the actions-rs and original actions/*-release repos stopped seeing
      # updates years ago), and this one action can both create the release AND (in the
      # build-and-upload job below) attach assets to it, which also lets us drop the whole
      # separate create-release job and its output-passing between jobs, one less thing
      # that can go wrong.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    # CHANGED: Now depends on 'test' instead of 'create-release' so it runs in parallel
    # This allows multiple build jobs to upload to the release concurrently
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bruh-linux-x86_64
            asset_name: bruh-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: bruh-linux-arm64
            asset_name: bruh-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bruh-macos-arm64
            asset_name: bruh-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: bruh-macos-x86_64
            asset_name: bruh-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bruh-windows-x86_64.exe
            asset_name: bruh-windows-x86_64.exe
          # Termux (Android) builds cross-compile on Ubuntu using cargo-ndk, see the
          # dedicated build step below, this target can't just run `cargo build --target`
          # directly the way the others can.
          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact_name: bruh-termux-aarch64
            asset_name: bruh-termux-aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # aarch64-unknown-linux-gnu needs a cross-linker to produce an arm64 binary from an
      # x86_64 ubuntu-latest runner, rustc alone can compile the object code for the
      # target, but the final link step needs an actual aarch64 linker present, which
      # isn't installed by default.
      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cargo-ndk
        if: matrix.target == 'aarch64-linux-android'
        run: cargo install cargo-ndk

      # FIXED: Removed ANDROID_NDK_HOME env var to let cargo-ndk auto-detect from ANDROID_NDK_ROOT
      - name: Build release binary (Termux/Android via cargo-ndk)
        if: matrix.target == 'aarch64-linux-android'
        # --platform 24 is Android 7.0, the minimum API level current mainline Termux
        # targets. Bump this if bruh ever needs to support older Termux/Android releases.
        run: cargo ndk --target aarch64-linux-android --platform 24 build --release

      - name: Build release binary (native cross-compilation)
        if: matrix.target != 'aarch64-linux-android'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary to asset name
        shell: bash
        run: |
          BIN_NAME="bruh"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BIN_NAME="bruh.exe"
          fi
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "${{ matrix.artifact_name }}"

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}

  # NEW: Publish to crates.io with verification, dry run, and post-publish verification
  publish-cratesio:
    needs: [test, create-release, build-and-upload]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi
          echo "Version matches: $VERSION"

      - name: Verify package (dry run)
        run: cargo package --no-verify

      - name: Dry run publish to crates.io
        run: cargo publish --dry-run --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish to crates.io
        id: publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Verify publication
        if: success()
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          echo "Waiting for crates.io index to update..."
          sleep 10
          echo "Searching for mybruh v$VERSION on crates.io..."
          if cargo search --limit 1 "mybruh" | grep -q "mybruh = \"$VERSION\""; then
            echo "Successfully published mybruh v$VERSION to crates.io!"
          else
            echo "Waiting longer for index update..."
            sleep 20
            if cargo search --limit 1 "mybruh" | grep -q "mybruh = \"$VERSION\""; then
              echo "Successfully published mybruh v$VERSION to crates.io!"
            else
              echo "::warning::Could not verify publication immediately. Check https://crates.io/crates/mybruh manually."
            fi
          fi

      - name: Link to crates.io in release notes (via comment)
        if: success()
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          echo "Published to crates.io: https://crates.io/crates/mybruh/$VERSION"
